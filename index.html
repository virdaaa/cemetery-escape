<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ПОБЕГ С КЛАДБИЩА</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0a0014;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}

#game-wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 480px;
    max-height: 854px;
    overflow: hidden;
}

canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
}

#ui-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
}

#hud {
    position: absolute;
    top: 12px; left: 12px; right: 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    font-size: 10px;
    color: #e0e0ff;
    text-shadow: 0 0 8px #7b2fff, 0 0 16px #7b2fff;
    z-index: 20;
}

.hud-left, .hud-right { display: flex; flex-direction: column; gap: 6px; }
.hud-right { align-items: flex-end; }

.hud-score { font-size: 14px; color: #ff2d95; text-shadow: 0 0 10px #ff2d95; }
.hud-label { font-size: 7px; color: #8866cc; }

.battery-bar {
    width: 80px; height: 10px;
    background: #1a0033;
    border: 1px solid #7b2fff;
    border-radius: 2px;
    overflow: hidden;
    box-shadow: 0 0 6px rgba(123,47,255,0.5);
}
.battery-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff2d95, #00ffcc);
    transition: width 0.3s;
}

.lives { display: flex; gap: 4px; }
.life { font-size: 12px; filter: drop-shadow(0 0 4px #ff2d95); }

#screen-menu, #screen-gameover {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(10, 0, 20, 0.92);
    z-index: 30;
    pointer-events: all;
    text-align: center;
    padding: 20px;
}

.menu-title {
    font-size: 18px;
    color: #ff2d95;
    text-shadow: 0 0 20px #ff2d95, 0 0 40px #ff2d95, 0 0 80px #7b2fff;
    margin-bottom: 8px;
    line-height: 1.6;
    animation: titlePulse 2s ease-in-out infinite;
}

@keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 20px #ff2d95, 0 0 40px #ff2d95, 0 0 80px #7b2fff; }
    50% { text-shadow: 0 0 30px #ff2d95, 0 0 60px #ff2d95, 0 0 120px #7b2fff; }
}

.menu-subtitle {
    font-size: 8px;
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc;
    margin-bottom: 40px;
    line-height: 1.8;
}

.menu-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: #0a0014;
    background: linear-gradient(180deg, #ff2d95, #cc0066);
    border: none;
    padding: 14px 32px;
    cursor: pointer;
    pointer-events: all;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(255,45,149,0.5), 0 4px 0 #990055;
    border-radius: 4px;
    margin: 8px;
    transition: transform 0.1s, box-shadow 0.1s;
}
.menu-btn:active {
    transform: translateY(2px);
    box-shadow: 0 0 20px rgba(255,45,149,0.5), 0 2px 0 #990055;
}

.menu-hint {
    font-size: 7px;
    color: #7b2fff;
    margin-top: 30px;
    line-height: 2;
    text-shadow: 0 0 6px #7b2fff;
}

.gameover-score {
    font-size: 24px;
    color: #00ffcc;
    text-shadow: 0 0 20px #00ffcc;
    margin: 20px 0;
}

.gameover-best {
    font-size: 10px;
    color: #7b2fff;
    margin-bottom: 30px;
}

.hidden { display: none !important; }

/* CRT effect */
#crt-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.15) 0px,
        rgba(0,0,0,0.15) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events: none;
    z-index: 15;
    opacity: 0.4;
}

/* Mobile controls hint */
.controls-hint {
    position: absolute;
    bottom: 20px; left: 0; right: 0;
    text-align: center;
    font-size: 7px;
    color: rgba(123,47,255,0.6);
    z-index: 20;
    pointer-events: none;
    animation: fadeOut 3s ease forwards 2s;
}
@keyframes fadeOut { to { opacity: 0; } }

/* Powerup notification */
.powerup-toast {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 10px;
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc;
    z-index: 25;
    pointer-events: none;
    animation: toastAnim 1s ease forwards;
}
@keyframes toastAnim {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -80%) scale(1.5); }
}
</style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="game"></canvas>
    <div id="crt-overlay"></div>

    <div id="ui-overlay">
        <div id="hud" class="hidden">
            <div class="hud-left">
                <div class="hud-score" id="score">0</div>
                <div class="hud-label">ДИСТАНЦИЯ</div>
                <div class="lives" id="lives"></div>
            </div>
            <div class="hud-right">
                <div class="hud-label">ФОНАРИК</div>
                <div class="battery-bar"><div class="battery-fill" id="battery-fill"></div></div>
                <div class="hud-label" id="stones-label" style="color:#ffaa44;">🪨 5</div>
                <div id="powerup-label" class="hud-label" style="color:#00ffcc;"></div>
            </div>
        </div>
    </div>

    <div id="screen-menu">
        <div class="menu-title">ПОБЕГ<br>С КЛАДБИЩА</div>
        <div class="menu-subtitle">ПЕТЕРБУРГ, 1986</div>
        <button class="menu-btn" id="btn-start">ИГРАТЬ</button>
        <div class="menu-hint">
            ← → ДВИЖЕНИЕ / СВАЙП<br>
            ↑ ↓ СКОРОСТЬ<br>
            ПРОБЕЛ — ПРЫЖОК<br>
            Z — РОГАТКА / X — ВСПЫШКА
        </div>
    </div>

    <div id="screen-gameover" class="hidden">
        <div class="menu-title" style="font-size:14px;">ПОЙМАЛИ!</div>
        <div class="gameover-score" id="final-score">0</div>
        <div class="hud-label">МЕТРОВ</div>
        <div class="gameover-best" id="best-score"></div>
        <div class="hud-label" id="boss-count-label" style="color:#ff2d95; font-size:9px; margin-bottom:16px;"></div>
        <button class="menu-btn" id="btn-restart">ЕЩЁ РАЗ</button>
        <button class="menu-btn" style="background:linear-gradient(180deg,#7b2fff,#5500cc);box-shadow:0 0 20px rgba(123,47,255,0.5),0 4px 0 #3a0088;" id="btn-menu">МЕНЮ</button>
    </div>
</div>

<script>
// ========================================
// ПОБЕГ С КЛАДБИЩА — Cemetery Escape Game
// 80s retro arcade for Yandex Games
// ========================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Game dimensions
const W = 480;
const H = 854;
canvas.width = W;
canvas.height = H;

// UI elements
const hudEl = document.getElementById('hud');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const batteryFill = document.getElementById('battery-fill');
const powerupLabel = document.getElementById('powerup-label');
const menuScreen = document.getElementById('screen-menu');
const gameoverScreen = document.getElementById('screen-gameover');
const finalScoreEl = document.getElementById('final-score');
const bestScoreEl = document.getElementById('best-score');
const stonesLabel = document.getElementById('stones-label');
const bossCountLabel = document.getElementById('boss-count-label');

// Audio context for retro sounds
let audioCtx = null;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(freq, duration, type = 'square', vol = 0.15) {
    if (!audioCtx) return;
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

function playCollect() { playSound(880, 0.1); setTimeout(() => playSound(1320, 0.15), 80); }
function playHit() { playSound(120, 0.3, 'sawtooth', 0.2); playSound(80, 0.4, 'square', 0.1); }
function playJump() { playSound(300, 0.15); setTimeout(() => playSound(500, 0.1), 60); }
function playDeath() {
    playSound(400, 0.2, 'sawtooth', 0.2);
    setTimeout(() => playSound(200, 0.3, 'sawtooth', 0.2), 150);
    setTimeout(() => playSound(100, 0.5, 'sawtooth', 0.15), 350);
}
function playShoot() { playSound(600, 0.08, 'triangle', 0.12); playSound(400, 0.1, 'square', 0.08); }
function playFlash() { playSound(1000, 0.15, 'square', 0.2); playSound(1200, 0.1, 'sine', 0.15); }
function playPowerup() {
    [440,554,659,880].forEach((f,i) => setTimeout(() => playSound(f, 0.15, 'square', 0.12), i*80));
}

// ========================================
// GAME STATE
// ========================================

let state = 'menu'; // menu, playing, gameover
let score = 0;
let bestScore = 0;
let lives = 10;
const MAX_LIVES = 10;
let battery = 100;
let speed = 0.8;
let baseSpeed = 0.8;
let frameCount = 0;
let difficulty = 1;
let shakeTimer = 0;
let invincibleTimer = 0;
let speedBoostTimer = 0;
let flashTimer = 0;
let scoreFrac = 0;
let stones = 5;
let flashCooldown = 0;
let speedMultiplier = 1; // 1 = normal, 1.5 = accel, 0.4 = brake
let lastTapTime = 0;
let lastCheckpoint = 0;
let heartTimer = 0;

// Boss state
let boss = null;
let bossProjectiles = [];
let bossSlowTimer = 0;
let bossesKilled = 0;
let nextBossScore = 5000;
let bossFlashTimer = 0;

const BOSS_DEFS = [
    { name: 'СМОТРИТЕЛЬ', baseHP: 10, w: 60, h: 70, color: '#aa8833', atkInterval: 120 },
    { name: 'ЖРЕЦ', baseHP: 15, w: 50, h: 70, color: '#4422aa', atkInterval: 90 },
    { name: 'МЕРТВЕЦ-ГИГАНТ', baseHP: 20, w: 120, h: 90, color: '#336622', atkInterval: 180 },
    { name: 'ВЕДЬМА', baseHP: 18, w: 50, h: 60, color: '#22aa44', atkInterval: 120 },
    { name: 'КОСТЯНОЙ ДРАКОН', baseHP: 25, w: 140, h: 80, color: '#ccaa55', atkInterval: 180 }
];

// Try load best score
try { bestScore = parseInt(localStorage.getItem('cemetery_best') || '0'); } catch(e) {}

// Player
const player = {
    x: W / 2,
    y: H - 140,
    w: 32,
    h: 48,
    vx: 0,
    jumping: false,
    jumpY: 0,
    jumpVel: 0,
    targetX: W / 2,
    lean: 0, // visual lean when turning
    pedalPhase: 0,
    wheelPhase: 0
};

// Game objects
let obstacles = [];
let enemies = [];
let pickups = [];
let particles = [];
let fogParticles = [];
let stars = [];
let roadMarkings = [];
let trees = [];
let projectiles = [];
// bossProjectiles defined in boss state section

// Spawn timers
let obstacleTimer = 0;
let enemyTimer = 0;
let pickupTimer = 0;
let treeTimer = 0;

// ========================================
// PIXEL ART DRAWING FUNCTIONS
// ========================================

function drawPixelRect(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

function drawBike(px, py, lean, pedalPhase, jumpY, isInvincible) {
    const x = Math.round(px - 16);
    const y = Math.round(py - 24 - jumpY);

    if (isInvincible && Math.floor(frameCount / 4) % 2 === 0) {
        ctx.globalAlpha = 0.5;
    }

    ctx.save();
    ctx.translate(px, py - jumpY);
    ctx.rotate(lean * 0.15);
    ctx.translate(-px, -(py - jumpY));

    // Shadow
    if (jumpY > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(px, py + 20, 14 - jumpY/10, 4, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    // === TOP-DOWN BIKE ===
    const wheelBob = Math.sin(pedalPhase * 8) * 1;

    // Back wheel (narrow vertical oval — top-down)
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.ellipse(px, y + 42 + wheelBob, 3, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(px, y + 42 + wheelBob, 3, 8, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Front wheel (narrow vertical oval — top-down)
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.ellipse(px, y + 4, 3, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(px, y + 4, 3, 8, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Frame (vertical line connecting wheels)
    ctx.strokeStyle = '#ff2d95';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(px, y + 42 + wheelBob);
    ctx.lineTo(px, y + 4);
    ctx.stroke();

    // Handlebars (short horizontal bar at front wheel)
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(px - 7, y + 5);
    ctx.lineTo(px + 7, y + 5);
    ctx.stroke();

    // Seat (small rectangle near back wheel)
    ctx.fillStyle = '#553322';
    ctx.fillRect(px - 4, y + 32 + wheelBob, 8, 5);

    // === TOP-DOWN RIDER ===
    const legPhase = Math.sin(pedalPhase * 4) * 4;

    // Legs along the frame (pedaling motion)
    ctx.strokeStyle = '#2244aa';
    ctx.lineWidth = 3;
    // Left leg
    ctx.beginPath();
    ctx.moveTo(px - 4, y + 28);
    ctx.lineTo(px - 5 - legPhase * 0.3, y + 38 + legPhase);
    ctx.stroke();
    // Right leg
    ctx.beginPath();
    ctx.moveTo(px + 4, y + 28);
    ctx.lineTo(px + 5 + legPhase * 0.3, y + 38 - legPhase);
    ctx.stroke();

    // Torso (rectangle, top-down)
    ctx.fillStyle = '#cc2200';
    ctx.fillRect(px - 5, y + 14, 10, 14);
    // Jacket stripe
    ctx.fillStyle = '#aa1100';
    ctx.fillRect(px - 5, y + 14, 2, 14);

    // Arms reaching toward handlebars
    ctx.strokeStyle = '#cc2200';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(px - 5, y + 16);
    ctx.lineTo(px - 7, y + 6);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px + 5, y + 16);
    ctx.lineTo(px + 7, y + 6);
    ctx.stroke();

    // Head (circle, top-down)
    ctx.fillStyle = '#442200'; // hair on top
    ctx.beginPath();
    ctx.arc(px, y + 10, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffcc88'; // face peeking
    ctx.beginPath();
    ctx.arc(px, y + 12, 4, 0, Math.PI);
    ctx.fill();

    // Flashlight beam (from handlebars)
    if (battery > 0) {
        const beamAlpha = Math.min(battery / 100, 1) * 0.25;
        const grad = ctx.createRadialGradient(px, y - 10, 5, px, y - 180, 120);
        grad.addColorStop(0, `rgba(255,255,200,${beamAlpha})`);
        grad.addColorStop(1, 'rgba(255,255,200,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(px - 8, y + 4);
        ctx.lineTo(px - 80, y - 280);
        ctx.lineTo(px + 80, y - 280);
        ctx.lineTo(px + 8, y + 4);
        ctx.fill();
    }

    ctx.restore();
    ctx.globalAlpha = 1;
}

function drawTombstone(x, y, type) {
    const by = Math.round(y);
    const bx = Math.round(x);

    switch(type) {
        case 0: // Simple rounded tombstone
            ctx.fillStyle = '#445566';
            ctx.beginPath();
            ctx.moveTo(bx - 14, by + 20);
            ctx.lineTo(bx - 14, by - 10);
            ctx.quadraticCurveTo(bx - 14, by - 25, bx, by - 28);
            ctx.quadraticCurveTo(bx + 14, by - 25, bx + 14, by - 10);
            ctx.lineTo(bx + 14, by + 20);
            ctx.fill();
            ctx.fillStyle = '#556677';
            ctx.fillRect(bx - 10, by - 8, 2, 16);
            // RIP text
            ctx.fillStyle = '#334455';
            ctx.fillRect(bx - 8, by - 16, 16, 2);
            ctx.fillRect(bx - 6, by - 10, 12, 2);
            ctx.fillRect(bx - 6, by - 4, 12, 2);
            break;

        case 1: // Cross
            ctx.fillStyle = '#667788';
            ctx.fillRect(bx - 3, by - 35, 6, 50);
            ctx.fillRect(bx - 14, by - 25, 28, 6);
            ctx.fillStyle = '#778899';
            ctx.fillRect(bx - 2, by - 34, 2, 48);
            break;

        case 2: // Wide monument
            ctx.fillStyle = '#445566';
            ctx.fillRect(bx - 18, by - 5, 36, 25);
            ctx.fillRect(bx - 14, by - 20, 28, 18);
            ctx.fillStyle = '#334455';
            ctx.fillRect(bx - 10, by - 10, 20, 2);
            ctx.fillRect(bx - 8, by - 4, 16, 2);
            // Ornament
            ctx.fillStyle = '#556677';
            ctx.fillRect(bx - 2, by - 18, 4, 4);
            break;

        case 3: // Broken tombstone
            ctx.fillStyle = '#445566';
            ctx.beginPath();
            ctx.moveTo(bx - 12, by + 20);
            ctx.lineTo(bx - 12, by - 5);
            ctx.lineTo(bx - 6, by - 15);
            ctx.lineTo(bx + 2, by - 8);
            ctx.lineTo(bx + 10, by - 18);
            ctx.lineTo(bx + 12, by - 5);
            ctx.lineTo(bx + 12, by + 20);
            ctx.fill();
            break;
    }

    // Ground base
    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(bx - 16, by + 18, 32, 6);
}

function drawZombie(x, y, phase, type) {
    const bx = Math.round(x);
    const by = Math.round(y);
    const wobble = Math.sin(phase) * 3;

    if (type === 0) {
        // Classic zombie
        // Body
        ctx.fillStyle = '#2d5a1d';
        ctx.fillRect(bx - 6 + wobble, by - 12, 12, 18);
        // Head
        ctx.fillStyle = '#4a7a3a';
        ctx.fillRect(bx - 5 + wobble, by - 20, 10, 9);
        // Eyes
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(bx - 3 + wobble, by - 17, 2, 2);
        ctx.fillRect(bx + 2 + wobble, by - 17, 2, 2);
        // Arms reaching forward
        ctx.fillStyle = '#4a7a3a';
        const armWave = Math.sin(phase * 2) * 4;
        ctx.fillRect(bx - 12 + wobble, by - 10 + armWave, 6, 3);
        ctx.fillRect(bx + 6 + wobble, by - 8 - armWave, 6, 3);
        // Legs
        const legOff = Math.sin(phase * 3) * 3;
        ctx.fillStyle = '#2d5a1d';
        ctx.fillRect(bx - 4 + wobble + legOff, by + 6, 3, 8);
        ctx.fillRect(bx + 2 + wobble - legOff, by + 6, 3, 8);
    } else {
        // Skeleton
        ctx.fillStyle = '#ddd';
        // Skull
        ctx.beginPath();
        ctx.arc(bx + wobble, by - 16, 7, 0, Math.PI * 2);
        ctx.fill();
        // Eyes
        ctx.fillStyle = '#000';
        ctx.fillRect(bx - 4 + wobble, by - 18, 3, 3);
        ctx.fillRect(bx + 1 + wobble, by - 18, 3, 3);
        // Jaw
        ctx.fillStyle = '#bbb';
        ctx.fillRect(bx - 4 + wobble, by - 12, 8, 2);
        // Ribs
        ctx.fillStyle = '#ccc';
        for (let i = 0; i < 4; i++) {
            ctx.fillRect(bx - 5 + wobble, by - 6 + i * 4, 10, 2);
        }
        // Spine
        ctx.fillRect(bx - 1 + wobble, by - 8, 2, 18);
        // Arms
        const armW = Math.sin(phase * 2) * 5;
        ctx.fillRect(bx - 10 + wobble, by - 4 + armW, 5, 2);
        ctx.fillRect(bx + 5 + wobble, by - 2 - armW, 5, 2);
    }
}

function drawGhost(x, y, phase) {
    const bx = Math.round(x);
    const by = Math.round(y + Math.sin(phase * 2) * 8);
    const alpha = 0.5 + Math.sin(phase * 3) * 0.2;

    ctx.globalAlpha = alpha;

    // Body
    ctx.fillStyle = '#aaccff';
    ctx.beginPath();
    ctx.moveTo(bx - 12, by + 15);
    for (let i = 0; i < 5; i++) {
        ctx.lineTo(bx - 12 + i * 6, by + 15 + (i % 2 ? 6 : 0));
    }
    ctx.lineTo(bx + 12, by + 15);
    ctx.lineTo(bx + 12, by - 5);
    ctx.quadraticCurveTo(bx + 12, by - 20, bx, by - 22);
    ctx.quadraticCurveTo(bx - 12, by - 20, bx - 12, by - 5);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(bx - 4, by - 10, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(bx + 4, by - 10, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Mouth
    ctx.beginPath();
    ctx.ellipse(bx, by - 2, 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;
}

function drawPickup(x, y, type, phase) {
    const bx = Math.round(x);
    const by = Math.round(y + Math.sin(phase * 3) * 3);
    const glow = 0.5 + Math.sin(phase * 4) * 0.3;

    // Glow
    ctx.save();
    ctx.globalAlpha = glow * 0.4;
    ctx.fillStyle = type === 0 ? '#00ffcc' : type === 1 ? '#ff2d95' : type === 2 ? '#ffaa00' : type === 3 ? '#aa8855' : '#ff2255';
    ctx.beginPath();
    ctx.arc(bx, by, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    if (type === 0) {
        // Battery
        ctx.fillStyle = '#00ffcc';
        ctx.fillRect(bx - 6, by - 8, 12, 16);
        ctx.fillRect(bx - 3, by - 11, 6, 3);
        ctx.fillStyle = '#00aa88';
        ctx.fillRect(bx - 4, by - 4, 8, 8);
        // Lightning bolt
        ctx.fillStyle = '#fff';
        ctx.fillRect(bx, by - 3, 2, 3);
        ctx.fillRect(bx - 2, by, 4, 2);
        ctx.fillRect(bx - 2, by + 2, 2, 3);
    } else if (type === 1) {
        // Cassette tape (invincibility)
        ctx.fillStyle = '#222';
        ctx.fillRect(bx - 10, by - 7, 20, 14);
        ctx.fillStyle = '#ff2d95';
        ctx.fillRect(bx - 8, by - 5, 16, 10);
        // Reels
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(bx - 3, by, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(bx + 3, by, 3, 0, Math.PI * 2);
        ctx.fill();
        // Label
        ctx.fillStyle = '#fff';
        ctx.fillRect(bx - 6, by - 4, 12, 2);
    } else if (type === 2) {
        // Cola can (speed boost)
        ctx.fillStyle = '#ff3300';
        ctx.fillRect(bx - 5, by - 9, 10, 18);
        ctx.fillStyle = '#fff';
        ctx.fillRect(bx - 4, by - 3, 8, 2);
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(bx - 3, by - 7, 6, 3);
        // Tab
        ctx.fillStyle = '#ccc';
        ctx.fillRect(bx - 2, by - 11, 4, 3);
    } else if (type === 3) {
        // Stone pile
        ctx.fillStyle = '#887766';
        ctx.beginPath();
        ctx.arc(bx - 4, by + 2, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#776655';
        ctx.beginPath();
        ctx.arc(bx + 4, by + 1, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#998877';
        ctx.beginPath();
        ctx.arc(bx, by - 4, 4, 0, Math.PI * 2);
        ctx.fill();
    } else if (type === 4) {
        // Heart
        ctx.fillStyle = '#ff2255';
        ctx.beginPath();
        ctx.moveTo(bx, by + 6);
        ctx.bezierCurveTo(bx - 10, by - 2, bx - 10, by - 10, bx, by - 6);
        ctx.bezierCurveTo(bx + 10, by - 10, bx + 10, by - 2, bx, by + 6);
        ctx.fill();
        // Highlight
        ctx.fillStyle = '#ff6688';
        ctx.beginPath();
        ctx.arc(bx - 3, by - 5, 2, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawTree(x, y, type) {
    const bx = Math.round(x);
    const by = Math.round(y);

    if (type === 0) {
        // Dead tree
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(bx, by + 30);
        ctx.lineTo(bx, by - 20);
        ctx.stroke();
        // Branches
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(bx, by - 10);
        ctx.lineTo(bx - 18, by - 30);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bx, by - 5);
        ctx.lineTo(bx + 15, by - 25);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bx - 18, by - 30);
        ctx.lineTo(bx - 25, by - 38);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bx + 15, by - 25);
        ctx.lineTo(bx + 22, by - 35);
        ctx.stroke();
    } else {
        // Iron fence piece
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(bx - 20, by - 15, 2, 30);
        ctx.fillRect(bx + 18, by - 15, 2, 30);
        ctx.fillRect(bx - 20, by - 12, 40, 2);
        ctx.fillRect(bx - 20, by + 8, 40, 2);
        // Bars
        for (let i = 0; i < 5; i++) {
            ctx.fillRect(bx - 14 + i * 8, by - 18, 2, 34);
        }
        // Spikes
        for (let i = 0; i < 5; i++) {
            const sx = bx - 15 + i * 8;
            ctx.beginPath();
            ctx.moveTo(sx, by - 18);
            ctx.lineTo(sx + 2, by - 18);
            ctx.lineTo(sx + 1, by - 24);
            ctx.fill();
        }
    }
}

// PARTICLE SYSTEM

function spawnParticle(x, y, color, vx, vy, life) {
    particles.push({ x, y, vx: vx || (Math.random() - 0.5) * 4, vy: vy || -Math.random() * 3, life, maxLife: life, color, size: 2 + Math.random() * 3 });
}

function spawnHitParticles(x, y) {
    for (let i = 0; i < 12; i++) {
        spawnParticle(x, y, ['#ff2d95', '#ff6600', '#ffcc00'][Math.floor(Math.random()*3)],
            (Math.random()-0.5)*8, (Math.random()-0.5)*8, 20+Math.random()*20);
    }
}

function spawnCollectParticles(x, y, color) {
    for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        spawnParticle(x, y, color, Math.cos(a)*4, Math.sin(a)*4, 15+Math.random()*10);
    }
}

// ========================================
// BACKGROUND & ENVIRONMENT
// ========================================

function initEnvironment() {
    stars = [];
    for (let i = 0; i < 60; i++) {
        stars.push({
            x: Math.random() * W,
            y: Math.random() * H * 0.4,
            size: Math.random() * 2 + 0.5,
            twinkle: Math.random() * Math.PI * 2
        });
    }

    fogParticles = [];
    for (let i = 0; i < 20; i++) {
        fogParticles.push({
            x: Math.random() * W,
            y: Math.random() * H,
            size: 50 + Math.random() * 100,
            speed: 0.2 + Math.random() * 0.5,
            alpha: 0.02 + Math.random() * 0.04
        });
    }
}

function drawBackground() {
    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#050010');
    skyGrad.addColorStop(0.3, '#0a0028');
    skyGrad.addColorStop(0.6, '#12003a');
    skyGrad.addColorStop(1, '#1a0044');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Stars
    stars.forEach(s => {
        const a = 0.3 + Math.sin(s.twinkle + frameCount * 0.03) * 0.4;
        ctx.globalAlpha = a;
        ctx.fillStyle = '#fff';
        ctx.fillRect(s.x, s.y, s.size, s.size);
    });
    ctx.globalAlpha = 1;

    // Moon
    ctx.fillStyle = '#eeeedd';
    ctx.beginPath();
    ctx.arc(380, 60, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#050010';
    ctx.beginPath();
    ctx.arc(392, 52, 26, 0, Math.PI * 2);
    ctx.fill();
    // Moon glow
    const moonGlow = ctx.createRadialGradient(380, 60, 30, 380, 60, 120);
    moonGlow.addColorStop(0, 'rgba(200,200,180,0.08)');
    moonGlow.addColorStop(1, 'rgba(200,200,180,0)');
    ctx.fillStyle = moonGlow;
    ctx.beginPath();
    ctx.arc(380, 60, 120, 0, Math.PI * 2);
    ctx.fill();

    // Ground
    const groundGrad = ctx.createLinearGradient(0, H * 0.35, 0, H);
    groundGrad.addColorStop(0, '#0a0a1a');
    groundGrad.addColorStop(1, '#0d0d22');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, H * 0.35, W, H * 0.65);

    // Path (dirt road)
    ctx.fillStyle = '#0f0f25';
    ctx.fillRect(W * 0.15, 0, W * 0.7, H);

    // Path edges
    ctx.fillStyle = '#1a1a35';
    ctx.fillRect(W * 0.15 - 3, 0, 3, H);
    ctx.fillRect(W * 0.85, 0, 3, H);

    // Road markings (gravel texture)
    roadMarkings.forEach(m => {
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#2a2a45';
        ctx.fillRect(m.x, m.y, m.w, 2);
        ctx.globalAlpha = 1;
    });

    // Fog
    fogParticles.forEach(f => {
        ctx.globalAlpha = f.alpha;
        ctx.fillStyle = '#7b2fff';
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
}

function drawDarkness() {
    if (battery <= 0) return;
    // Vignette darkness when battery is low
    const darknessLevel = 1 - (battery / 100);
    if (darknessLevel > 0.1) {
        const vigGrad = ctx.createRadialGradient(player.x, player.y - player.jumpY, 80, player.x, player.y - player.jumpY, 350);
        vigGrad.addColorStop(0, `rgba(0,0,0,0)`);
        vigGrad.addColorStop(1, `rgba(0,0,0,${darknessLevel * 0.7})`);
        ctx.fillStyle = vigGrad;
        ctx.fillRect(0, 0, W, H);
    }
}

function drawFullDarkness() {
    if (battery > 0) return;
    // Almost total darkness with tiny circle of vision
    const vigGrad = ctx.createRadialGradient(player.x, player.y - player.jumpY, 150, player.x, player.y - player.jumpY, 350);
    vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vigGrad.addColorStop(0.6, 'rgba(0,0,0,0.4)');
    vigGrad.addColorStop(1, 'rgba(0,0,0,0.7)');
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, W, H);
}

// GAME LOGIC

function resetGame() {
    score = 0;
    lives = 10;
    lastCheckpoint = 0;
    heartTimer = 0;
    battery = 100;
    speed = 0.8;
    scoreFrac = 0;
    difficulty = 1;
    frameCount = 0;
    shakeTimer = 0;
    invincibleTimer = 0;
    speedBoostTimer = 0;
    flashTimer = 0;
    player.x = W / 2;
    player.y = H - 100;
    player.vx = 0;
    player.jumping = false;
    player.jumpY = 0;
    player.jumpVel = 0;
    player.lean = 0;
    player.pedalPhase = 0;
    stones = 5;
    flashCooldown = 0;
    speedMultiplier = 1;
    boss = null;
    bossProjectiles = [];
    bossSlowTimer = 0;
    bossesKilled = 0;
    nextBossScore = 5000;
    bossFlashTimer = 0;
    obstacles = [];
    enemies = [];
    pickups = [];
    particles = [];
    projectiles = [];
    trees = [];
    roadMarkings = [];
    obstacleTimer = 0;
    enemyTimer = 0;
    pickupTimer = 0;
    treeTimer = 0;
    initEnvironment();
    updateHUD();
}

function spawnObstacle() {
    const minX = W * 0.18;
    const maxX = W * 0.82;
    const x = minX + Math.random() * (maxX - minX);
    obstacles.push({
        x, y: -40,
        type: Math.floor(Math.random() * 4),
        w: 30, h: 40
    });
}

function spawnEnemy() {
    if (score < 500) return; // No enemies below 500 points
    const minX = W * 0.2;
    const maxX = W * 0.8;
    const x = minX + Math.random() * (maxX - minX);

    // Build pool of available enemy types based on score
    const pool = [];
    if (score >= 500) pool.push('zombie');
    if (score >= 1000) pool.push('ghost');
    if (score >= 2000) pool.push('hand');

    const chosen = pool[Math.floor(Math.random() * pool.length)];

    if (chosen === 'zombie') {
        enemies.push({ x, y: -30, type: 'zombie', subtype: Math.random() < 0.5 ? 0 : 1, vx: (Math.random() < 0.5 ? -0.2 : 0.2), phase: Math.random()*Math.PI*2, w: 20, h: 30 });
    } else if (chosen === 'ghost') {
        enemies.push({ x, y: -30, type: 'ghost', phase: Math.random()*Math.PI*2, w: 24, h: 30 });
    } else if (chosen === 'hand') {
        enemies.push({ x, y: -30, type: 'hand', phase: 0, w: 16, h: 20, popTimer: 60 });
    }
}

function spawnPickup() {
    const minX = W * 0.22;
    const maxX = W * 0.78;
    const x = minX + Math.random() * (maxX - minX);
    const roll = Math.random();
    let type;
    if (roll < 0.4) type = 0; // battery
    else if (roll < 0.6) type = 1; // cassette
    else if (roll < 0.75) type = 2; // cola
    else type = 3; // stones
    pickups.push({ x, y: -20, type, phase: Math.random()*Math.PI*2, w: 20, h: 20 });
}

function spawnRoadMarking() {
    const minX = W * 0.18;
    const maxX = W * 0.82;
    roadMarkings.push({
        x: minX + Math.random() * (maxX - minX),
        y: -5,
        w: 5 + Math.random() * 15
    });
}

function spawnTree() {
    const side = Math.random() < 0.5 ? -1 : 1;
    const x = side < 0 ? W * 0.08 + Math.random() * 20 : W * 0.88 + Math.random() * 20;
    trees.push({ x, y: -50, type: Math.floor(Math.random() * 2) });
}

function checkCollision(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax - aw/2 < bx + bw/2 && ax + aw/2 > bx - bw/2 &&
           ay - ah/2 < by + bh/2 && ay + ah/2 > by - bh/2;
}

function hitPlayer() {
    if (invincibleTimer > 0) return;
    lives--;
    playHit();
    shakeTimer = 15;
    invincibleTimer = 120; // 2s invincibility
    spawnHitParticles(player.x, player.y);

    if (lives <= 0) {
        gameOver();
    }
    updateHUD();
}

function gameOver() {
    state = 'gameover';
    playDeath();
    if (score > bestScore) {
        bestScore = score;
        try { localStorage.setItem('cemetery_best', bestScore.toString()); } catch(e) {}
    }
    finalScoreEl.textContent = score;
    bestScoreEl.textContent = `РЕКОРД: ${bestScore}`;
    bossCountLabel.textContent = bossesKilled > 0 ? `БОССОВ: ${bossesKilled}` : '';
    hudEl.classList.add('hidden');
    gameoverScreen.classList.remove('hidden');
}

function updateHUD() {
    scoreEl.textContent = score;
    batteryFill.style.width = `${Math.max(0, battery)}%`;
    batteryFill.style.background = battery < 25 ? '#ff2d55' :
        battery < 50 ? '#ffaa00' : 'linear-gradient(90deg, #ff2d95, #00ffcc)';

    livesEl.innerHTML = '';
    if (lives > 5) {
        // Compact display for many lives
        const span = document.createElement('span');
        span.className = 'life';
        span.textContent = `❤️×${lives}`;
        livesEl.appendChild(span);
    } else {
        for (let i = 0; i < 5; i++) {
            const span = document.createElement('span');
            span.className = 'life';
            span.textContent = i < lives ? '❤️' : '🖤';
            livesEl.appendChild(span);
        }
    }

    stonesLabel.textContent = `🪨 ${stones}`;

    if (invincibleTimer > 0) {
        powerupLabel.textContent = '🎵 НЕУЯЗВИМ!';
    } else if (speedBoostTimer > 0) {
        powerupLabel.textContent = '⚡ УСКОРЕНИЕ!';
    } else if (flashCooldown > 0) {
        powerupLabel.textContent = `🔦 ${Math.ceil(flashCooldown / 60)}с`;
    } else {
        powerupLabel.textContent = '';
    }
}

function showToast(text) {
    const el = document.createElement('div');
    el.className = 'powerup-toast';
    el.textContent = text;
    document.getElementById('ui-overlay').appendChild(el);
    setTimeout(() => el.remove(), 1200);
}

// ========================================
// BOSS SYSTEM
// ========================================

function spawnBoss() {
    const cycle = Math.floor(bossesKilled / 5);
    const idx = bossesKilled % 5;
    const def = BOSS_DEFS[idx];
    const extraHP = cycle * 10;
    boss = {
        type: idx,
        name: def.name,
        x: W / 2,
        y: 130,
        w: def.w,
        h: def.h,
        hp: def.baseHP + extraHP,
        maxHP: def.baseHP + extraHP,
        color: def.color,
        phase: 0,
        atkTimer: def.atkInterval,
        atkInterval: def.atkInterval,
        flashTimer: 0,
        vx: 1,
        // type-specific
        teleportTimer: 0,
        breathWarning: 0,
        breathActive: 0,
        breathX: W / 2,
        crackWarning: 0,
        crackActive: 0,
        crackPositions: []
    };
    bossProjectiles = [];
    bossSlowTimer = 60;
    showToast(`⚔️ ${def.name}`);
    playPowerup();
}

function updateBoss() {
    if (!boss) return;
    boss.phase += 0.03;
    if (boss.flashTimer > 0) boss.flashTimer--;
    if (bossSlowTimer > 0) bossSlowTimer--;

    const spd = bossSlowTimer > 0 ? 0.3 : 1;

    // Movement patterns per type
    switch (boss.type) {
        case 0: // Смотритель — side to side
            boss.x += boss.vx * 1.5 * spd;
            if (boss.x < 60 || boss.x > W - 60) boss.vx *= -1;
            break;
        case 1: // Жрец — teleport every 120 frames
            boss.teleportTimer++;
            if (boss.teleportTimer > 120) {
                boss.teleportTimer = 0;
                boss.x = 80 + Math.random() * (W - 160);
            }
            break;
        case 2: // Гигант — slow movement
            boss.x += boss.vx * 0.5 * spd;
            if (boss.x < 80 || boss.x > W - 80) boss.vx *= -1;
            break;
        case 3: // Ведьма — fast erratic (stays in upper area)
            boss.x += Math.sin(boss.phase * 3) * 3 * spd;
            boss.y = 120 + Math.sin(boss.phase * 2) * 20;
            break;
        case 4: // Дракон — slow wide
            boss.x += boss.vx * 0.8 * spd;
            if (boss.x < 100 || boss.x > W - 100) boss.vx *= -1;
            break;
    }

    // Attack timer
    boss.atkTimer--;
    if (boss.atkTimer <= 0 && bossSlowTimer <= 0) {
        boss.atkTimer = boss.atkInterval;
        bossAttack();
    }

    // Update crack warning/active for giant
    if (boss.type === 2) {
        if (boss.crackWarning > 0) {
            boss.crackWarning--;
            if (boss.crackWarning <= 0) boss.crackActive = 20;
        }
        if (boss.crackActive > 0) boss.crackActive--;
    }

    // Update breath for dragon
    if (boss.type === 4) {
        if (boss.breathWarning > 0) {
            boss.breathWarning--;
            if (boss.breathWarning <= 0) boss.breathActive = 40;
        }
        if (boss.breathActive > 0) boss.breathActive--;
    }

    // Update boss projectiles
    bossProjectiles.forEach(bp => {
        bp.x += bp.vx || 0;
        bp.y += bp.vy || 0;
        if (bp.phase !== undefined) bp.phase += 0.05;
        // Witch homing
        if (bp.homing) {
            const dx = player.x - bp.x;
            const dy = player.y - bp.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 0) {
                bp.vx += (dx / dist) * 0.15;
                bp.vy += (dy / dist) * 0.15;
                const maxV = 3;
                const v = Math.sqrt(bp.vx * bp.vx + bp.vy * bp.vy);
                if (v > maxV) { bp.vx = bp.vx / v * maxV; bp.vy = bp.vy / v * maxV; }
            }
        }
    });
    bossProjectiles = bossProjectiles.filter(bp => bp.y < H + 30 && bp.y > -30 && bp.x > -30 && bp.x < W + 30);

    // Boss projectile vs player collision
    const px = player.x;
    const py = player.y - player.jumpY;
    for (let i = bossProjectiles.length - 1; i >= 0; i--) {
        const bp = bossProjectiles[i];
        if (checkCollision(px, py, 18, 28, bp.x, bp.y, bp.w || 12, bp.h || 12)) {
            hitPlayer();
            bossProjectiles.splice(i, 1);
            break;
        }
    }

    // Player stones vs boss
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const pr = projectiles[i];
        if (checkCollision(pr.x, pr.y, 6, 6, boss.x, boss.y, boss.w, boss.h)) {
            boss.hp--;
            boss.flashTimer = 8;
            projectiles.splice(i, 1);
            spawnParticle(pr.x, pr.y, '#ffcc00', (Math.random()-0.5)*4, -2, 15);
            playHit();
            if (boss.hp <= 0) {
                killBoss();
                return;
            }
        }
    }

    // Player stones vs witch fireballs
    if (boss && boss.type === 3) {
        for (let pi = projectiles.length - 1; pi >= 0; pi--) {
            for (let bi = bossProjectiles.length - 1; bi >= 0; bi--) {
                const pr = projectiles[pi];
                const bp = bossProjectiles[bi];
                if (pr && bp && checkCollision(pr.x, pr.y, 6, 6, bp.x, bp.y, 12, 12)) {
                    spawnHitParticles(bp.x, bp.y);
                    projectiles.splice(pi, 1);
                    bossProjectiles.splice(bi, 1);
                    break;
                }
            }
        }
    }

    // Giant crack damage
    if (boss && boss.type === 2 && boss.crackActive > 0) {
        boss.crackPositions.forEach(cx => {
            if (Math.abs(player.x - cx) < 20 && invincibleTimer <= 0) {
                hitPlayer();
            }
        });
    }

    // Dragon breath damage
    if (boss && boss.type === 4 && boss.breathActive > 0) {
        const bx = boss.breathX;
        if (Math.abs(player.x - bx) < 40 && player.y - player.jumpY < H - 50 && invincibleTimer <= 0) {
            hitPlayer();
        }
    }
}

function bossAttack() {
    if (!boss) return;
    switch (boss.type) {
        case 0: // Shovel throw
            bossProjectiles.push({ x: boss.x, y: boss.y + 30, vx: 0, vy: 4, w: 10, h: 20, kind: 'shovel', phase: 0 });
            break;
        case 1: // Ghost wave (3 ghosts in fan)
            for (let i = -1; i <= 1; i++) {
                bossProjectiles.push({ x: boss.x, y: boss.y + 30, vx: i * 1.5, vy: 3, w: 16, h: 16, kind: 'minighost', phase: Math.random() * Math.PI * 2 });
            }
            break;
        case 2: // Ground cracks
            boss.crackPositions = [];
            for (let i = 0; i < 3; i++) {
                boss.crackPositions.push(W * 0.2 + Math.random() * (W * 0.6));
            }
            boss.crackWarning = 30;
            break;
        case 3: // Homing fireball
            bossProjectiles.push({ x: boss.x, y: boss.y + 20, vx: 0, vy: 1.5, w: 14, h: 14, kind: 'fireball', homing: true, phase: 0 });
            break;
        case 4: // Breath + bones
            boss.breathX = boss.x;
            boss.breathWarning = 60;
            // Side bones
            bossProjectiles.push({ x: 20, y: boss.y + 20, vx: 2, vy: 3, w: 10, h: 10, kind: 'bone', phase: 0 });
            bossProjectiles.push({ x: W - 20, y: boss.y + 20, vx: -2, vy: 3, w: 10, h: 10, kind: 'bone', phase: 0 });
            break;
    }
}

function killBoss() {
    // Explosion particles
    for (let i = 0; i < 30; i++) {
        spawnParticle(boss.x, boss.y, ['#ff2d95', '#ffcc00', '#00ffcc', '#ff6600'][Math.floor(Math.random()*4)],
            (Math.random()-0.5)*12, (Math.random()-0.5)*12, 30+Math.random()*30);
    }
    score += 500;
    bossesKilled++;
    nextBossScore += 5000;
    playPowerup();
    showToast(`+500 💀 ${boss.name} ПОВЕРЖЕН!`);
    // Drop 3 pickups
    for (let i = 0; i < 3; i++) {
        const px = boss.x - 30 + i * 30;
        const roll = Math.random();
        const type = roll < 0.3 ? 0 : roll < 0.5 ? 3 : roll < 0.7 ? 4 : 1;
        pickups.push({ x: px, y: boss.y, type, phase: Math.random()*Math.PI*2, w: 20, h: 20 });
    }
    shakeTimer = 20;
    boss = null;
    bossProjectiles = [];
}

function drawBoss() {
    if (!boss) return;
    const bx = Math.round(boss.x);
    const by = Math.round(boss.y);

    if (boss.flashTimer > 0 && Math.floor(boss.flashTimer / 2) % 2 === 0) {
        ctx.globalAlpha = 0.5;
    }

    ctx.save();
    switch (boss.type) {
        case 0: // СМОТРИТЕЛЬ — man in cloak with lantern
            // Cloak body
            ctx.fillStyle = '#553311';
            ctx.beginPath();
            ctx.moveTo(bx - 20, by + 35);
            ctx.lineTo(bx - 15, by - 15);
            ctx.lineTo(bx + 15, by - 15);
            ctx.lineTo(bx + 20, by + 35);
            ctx.fill();
            // Cloak highlight
            ctx.fillStyle = '#664422';
            ctx.fillRect(bx - 8, by - 12, 4, 40);
            // Head
            ctx.fillStyle = '#cc9966';
            ctx.beginPath();
            ctx.arc(bx, by - 22, 10, 0, Math.PI * 2);
            ctx.fill();
            // Hat
            ctx.fillStyle = '#332211';
            ctx.fillRect(bx - 14, by - 32, 28, 6);
            ctx.fillRect(bx - 8, by - 42, 16, 12);
            // Eyes
            ctx.fillStyle = '#ff4400';
            ctx.fillRect(bx - 5, by - 24, 3, 3);
            ctx.fillRect(bx + 2, by - 24, 3, 3);
            // Lantern (in right hand)
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(bx + 18, by - 5, 8, 12);
            ctx.fillStyle = '#ffee88';
            ctx.globalAlpha = 0.3 + Math.sin(boss.phase * 4) * 0.2;
            ctx.beginPath();
            ctx.arc(bx + 22, by, 16, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            // Shovel (in left hand)
            ctx.fillStyle = '#888';
            ctx.fillRect(bx - 22, by - 10, 3, 30);
            ctx.fillStyle = '#666';
            ctx.fillRect(bx - 25, by - 14, 9, 6);
            break;

        case 1: // ЖРЕЦ — hooded figure in black robe
            // Robe
            ctx.fillStyle = '#1a0033';
            ctx.beginPath();
            ctx.moveTo(bx - 22, by + 35);
            ctx.lineTo(bx - 18, by - 10);
            ctx.quadraticCurveTo(bx, by - 30, bx + 18, by - 10);
            ctx.lineTo(bx + 22, by + 35);
            ctx.fill();
            // Hood
            ctx.fillStyle = '#220044';
            ctx.beginPath();
            ctx.arc(bx, by - 18, 14, Math.PI, Math.PI * 2);
            ctx.fill();
            ctx.fillRect(bx - 14, by - 18, 28, 8);
            // Face shadow
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(bx, by - 14, 8, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            // Glowing eyes
            ctx.fillStyle = '#aa00ff';
            ctx.fillRect(bx - 5, by - 16, 3, 3);
            ctx.fillRect(bx + 2, by - 16, 3, 3);
            // Purple glow
            ctx.globalAlpha = 0.15 + Math.sin(boss.phase * 3) * 0.1;
            ctx.fillStyle = '#7b2fff';
            ctx.beginPath();
            ctx.arc(bx, by, 35, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            // Hands
            ctx.fillStyle = '#443366';
            ctx.fillRect(bx - 24, by + 5, 6, 4);
            ctx.fillRect(bx + 18, by + 5, 6, 4);
            break;

        case 2: // МЕРТВЕЦ-ГИГАНТ — huge zombie
            // Legs
            ctx.fillStyle = '#224411';
            const legOff = Math.sin(boss.phase * 2) * 3;
            ctx.fillRect(bx - 25 + legOff, by + 30, 18, 16);
            ctx.fillRect(bx + 8 - legOff, by + 30, 18, 16);
            // Body
            ctx.fillStyle = '#336622';
            ctx.fillRect(bx - 35, by - 15, 70, 48);
            // Ribs visible
            ctx.fillStyle = '#224411';
            for (let i = 0; i < 4; i++) {
                ctx.fillRect(bx - 25, by - 5 + i * 10, 50, 3);
            }
            // Arms
            const armW = Math.sin(boss.phase * 2) * 6;
            ctx.fillStyle = '#447733';
            ctx.fillRect(bx - 50, by - 5 + armW, 18, 8);
            ctx.fillRect(bx + 32, by - 5 - armW, 18, 8);
            // Head
            ctx.fillStyle = '#448833';
            ctx.beginPath();
            ctx.arc(bx, by - 25, 18, 0, Math.PI * 2);
            ctx.fill();
            // Eyes
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(bx - 10, by - 30, 6, 5);
            ctx.fillRect(bx + 4, by - 30, 6, 5);
            // Mouth
            ctx.fillStyle = '#220000';
            ctx.fillRect(bx - 8, by - 20, 16, 4);
            // Teeth
            ctx.fillStyle = '#eecc88';
            for (let i = 0; i < 4; i++) ctx.fillRect(bx - 6 + i * 4, by - 20, 2, 3);
            break;

        case 3: // ВЕДЬМА — floating witch
            // Hover effect
            const hover = Math.sin(boss.phase * 3) * 5;
            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(bx, by + 35, 20, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            // Dress
            ctx.fillStyle = '#115522';
            ctx.beginPath();
            ctx.moveTo(bx - 20, by + 25 + hover);
            ctx.lineTo(bx - 10, by - 10 + hover);
            ctx.lineTo(bx + 10, by - 10 + hover);
            ctx.lineTo(bx + 20, by + 25 + hover);
            ctx.fill();
            // Green glow
            ctx.globalAlpha = 0.2;
            ctx.fillStyle = '#00ff44';
            ctx.beginPath();
            ctx.arc(bx, by + hover, 30, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            // Head
            ctx.fillStyle = '#88cc44';
            ctx.beginPath();
            ctx.arc(bx, by - 16 + hover, 10, 0, Math.PI * 2);
            ctx.fill();
            // Hat
            ctx.fillStyle = '#113311';
            ctx.beginPath();
            ctx.moveTo(bx - 16, by - 22 + hover);
            ctx.lineTo(bx, by - 48 + hover);
            ctx.lineTo(bx + 16, by - 22 + hover);
            ctx.fill();
            ctx.fillRect(bx - 18, by - 24 + hover, 36, 4);
            // Eyes
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(bx - 5, by - 18 + hover, 3, 3);
            ctx.fillRect(bx + 2, by - 18 + hover, 3, 3);
            // Hands with magic
            ctx.fillStyle = '#88cc44';
            ctx.fillRect(bx - 22, by + hover, 5, 4);
            ctx.fillRect(bx + 17, by + hover, 5, 4);
            // Magic sparkle in hands
            ctx.fillStyle = '#00ff44';
            const sp = Math.sin(boss.phase * 6) * 3;
            ctx.beginPath();
            ctx.arc(bx - 20 + sp, by - 2 + hover, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(bx + 20 - sp, by - 2 + hover, 3, 0, Math.PI * 2);
            ctx.fill();
            break;

        case 4: // КОСТЯНОЙ ДРАКОН — bone dragon
            // Spine/body
            ctx.fillStyle = '#ccbb88';
            ctx.beginPath();
            ctx.moveTo(bx - 50, by + 10);
            for (let i = 0; i < 8; i++) {
                ctx.lineTo(bx - 50 + i * 14, by - 5 + Math.sin(boss.phase * 2 + i) * 5);
            }
            ctx.lineTo(bx + 50, by + 10);
            ctx.fill();
            // Ribs
            ctx.strokeStyle = '#bbaa77';
            ctx.lineWidth = 2;
            for (let i = -3; i <= 3; i++) {
                ctx.beginPath();
                ctx.moveTo(bx + i * 12, by - 2 + Math.sin(boss.phase * 2 + i) * 3);
                ctx.lineTo(bx + i * 12 + (i < 0 ? -8 : 8), by + 18);
                ctx.stroke();
            }
            // Wings (skeletal)
            ctx.strokeStyle = '#aa9966';
            ctx.lineWidth = 2;
            const wingPhase = Math.sin(boss.phase * 2) * 8;
            // Left wing
            ctx.beginPath();
            ctx.moveTo(bx - 30, by - 5);
            ctx.lineTo(bx - 60, by - 25 - wingPhase);
            ctx.lineTo(bx - 50, by + 5 - wingPhase);
            ctx.stroke();
            // Right wing
            ctx.beginPath();
            ctx.moveTo(bx + 30, by - 5);
            ctx.lineTo(bx + 60, by - 25 - wingPhase);
            ctx.lineTo(bx + 50, by + 5 - wingPhase);
            ctx.stroke();
            // Skull head
            ctx.fillStyle = '#ddd';
            ctx.beginPath();
            ctx.ellipse(bx, by - 18, 14, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            // Jaw
            ctx.fillStyle = '#bbb';
            ctx.beginPath();
            ctx.ellipse(bx, by - 8, 10, 5, 0, 0, Math.PI);
            ctx.fill();
            // Teeth
            ctx.fillStyle = '#eee';
            for (let i = -3; i <= 3; i++) {
                ctx.fillRect(bx + i * 3 - 1, by - 12, 2, 4);
            }
            // Eye sockets
            ctx.fillStyle = '#ff3300';
            ctx.beginPath();
            ctx.arc(bx - 5, by - 20, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(bx + 5, by - 20, 4, 0, Math.PI * 2);
            ctx.fill();
            // Horns
            ctx.fillStyle = '#aa9966';
            ctx.beginPath();
            ctx.moveTo(bx - 10, by - 25);
            ctx.lineTo(bx - 20, by - 40);
            ctx.lineTo(bx - 6, by - 22);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(bx + 10, by - 25);
            ctx.lineTo(bx + 20, by - 40);
            ctx.lineTo(bx + 6, by - 22);
            ctx.fill();
            break;
    }
    ctx.restore();
    ctx.globalAlpha = 1;

    // Draw boss projectiles
    bossProjectiles.forEach(bp => {
        switch (bp.kind) {
            case 'shovel':
                ctx.save();
                ctx.translate(bp.x, bp.y);
                ctx.rotate(bp.phase * 4);
                ctx.fillStyle = '#888';
                ctx.fillRect(-2, -10, 4, 16);
                ctx.fillStyle = '#666';
                ctx.fillRect(-5, -12, 10, 4);
                ctx.restore();
                break;
            case 'minighost':
                ctx.globalAlpha = 0.6 + Math.sin(bp.phase * 3) * 0.2;
                ctx.fillStyle = '#aaccff';
                ctx.beginPath();
                ctx.arc(bp.x, bp.y, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.fillRect(bp.x - 3, bp.y - 2, 2, 2);
                ctx.fillRect(bp.x + 1, bp.y - 2, 2, 2);
                ctx.globalAlpha = 1;
                break;
            case 'fireball':
                ctx.fillStyle = '#00ff44';
                ctx.beginPath();
                ctx.arc(bp.x, bp.y, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#88ff88';
                ctx.beginPath();
                ctx.arc(bp.x, bp.y, 4, 0, Math.PI * 2);
                ctx.fill();
                // Trail
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = '#00ff44';
                ctx.beginPath();
                ctx.arc(bp.x - bp.vx * 2, bp.y - bp.vy * 2, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                break;
            case 'bone':
                ctx.save();
                ctx.translate(bp.x, bp.y);
                ctx.rotate(bp.phase * 5);
                ctx.fillStyle = '#ddd';
                ctx.fillRect(-5, -2, 10, 4);
                ctx.beginPath();
                ctx.arc(-5, 0, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(5, 0, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                break;
        }
    });

    // Giant ground cracks
    if (boss && boss.type === 2) {
        if (boss.crackWarning > 0) {
            ctx.globalAlpha = 0.3 + Math.sin(frameCount * 0.5) * 0.2;
            ctx.strokeStyle = '#ff4400';
            ctx.lineWidth = 3;
            boss.crackPositions.forEach(cx => {
                ctx.beginPath();
                ctx.moveTo(cx, boss.y + 40);
                ctx.lineTo(cx, H);
                ctx.stroke();
            });
            ctx.globalAlpha = 1;
        }
        if (boss.crackActive > 0) {
            ctx.fillStyle = '#ff6600';
            ctx.globalAlpha = boss.crackActive / 20;
            boss.crackPositions.forEach(cx => {
                ctx.fillRect(cx - 10, boss.y + 40, 20, H - boss.y - 40);
            });
            ctx.globalAlpha = 1;
        }
    }

    // Dragon breath
    if (boss && boss.type === 4) {
        if (boss.breathWarning > 0) {
            ctx.globalAlpha = 0.2 + Math.sin(frameCount * 0.4) * 0.15;
            ctx.strokeStyle = '#ff6600';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(boss.breathX - 30, boss.y + 40);
            ctx.lineTo(boss.breathX - 50, H);
            ctx.moveTo(boss.breathX + 30, boss.y + 40);
            ctx.lineTo(boss.breathX + 50, H);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }
        if (boss.breathActive > 0) {
            const ba = boss.breathActive / 40;
            ctx.globalAlpha = ba * 0.6;
            const grad = ctx.createLinearGradient(boss.breathX, boss.y + 40, boss.breathX, H);
            grad.addColorStop(0, '#ff6600');
            grad.addColorStop(0.5, '#ff3300');
            grad.addColorStop(1, '#aa0000');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(boss.breathX - 25, boss.y + 40);
            ctx.lineTo(boss.breathX - 55, H);
            ctx.lineTo(boss.breathX + 55, H);
            ctx.lineTo(boss.breathX + 25, boss.y + 40);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    // HP bar
    const barW = 200;
    const barH = 8;
    const barX = (W - barW) / 2;
    const barY = 10;
    ctx.fillStyle = '#1a0033';
    ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
    ctx.fillStyle = '#330011';
    ctx.fillRect(barX, barY, barW, barH);
    const hpRatio = boss.hp / boss.maxHP;
    const hpColor = hpRatio > 0.5 ? '#ff2d95' : hpRatio > 0.25 ? '#ff6600' : '#ff0000';
    ctx.fillStyle = hpColor;
    ctx.fillRect(barX, barY, barW * hpRatio, barH);
    // Boss name
    ctx.fillStyle = '#fff';
    ctx.font = '7px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(boss.name, W / 2, barY + barH + 12);
    ctx.textAlign = 'start';
}

// ========================================
// INPUT
// ========================================

const keys = {};
let touchStartX = null;
let touchMoveX = null;
let touchStartY = null;
let touchMoveY = null;

document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (state === 'playing') {
        if (e.code === 'Space') { e.preventDefault(); tryJump(); }
        if (e.code === 'KeyZ') { e.preventDefault(); shootStone(); }
        if (e.code === 'KeyX') { e.preventDefault(); flashAbility(); }
        if (e.code === 'ArrowUp' || e.code === 'ArrowDown') e.preventDefault();
    }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
const wrapper = document.getElementById('game-wrapper');
wrapper.addEventListener('touchstart', e => {
    e.preventDefault();
    initAudio();
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchMoveX = t.clientX;
    touchStartY = t.clientY;
    touchMoveY = t.clientY;

    if (state === 'playing') {
        const rect = wrapper.getBoundingClientRect();
        const relX = (t.clientX - rect.left) / rect.width;
        const relY = (t.clientY - rect.top) / rect.height;

        // Double-tap detection for flash
        const now = Date.now();
        if (now - lastTapTime < 300) {
            flashAbility();
            lastTapTime = 0;
        } else {
            lastTapTime = now;
        }

        // Right half tap — shoot stone
        if (relX > 0.5 && relY > 0.4) {
            shootStone();
        }
        // Top area tap — jump
        else if (relY < 0.4) {
            tryJump();
        }
    }
}, { passive: false });

wrapper.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length > 0) {
        touchMoveX = e.touches[0].clientX;
        touchMoveY = e.touches[0].clientY;
    }
}, { passive: false });

wrapper.addEventListener('touchend', e => {
    touchStartX = null;
    touchMoveX = null;
    touchStartY = null;
    touchMoveY = null;
    speedMultiplier = 1;
});

function tryJump() {
    if (!player.jumping) {
        player.jumping = true;
        player.jumpVel = -12;
        playJump();
    }
}

function shootStone() {
    if (stones <= 0) return;
    stones--;
    playShoot();
    projectiles.push({
        x: player.x,
        y: player.y - player.jumpY - 30,
        vy: -8,
        size: 4
    });
    updateHUD();
}

function flashAbility() {
    if (flashCooldown > 0 || battery < 20) return;
    battery -= 20;
    flashCooldown = 180; // 3 seconds at 60fps
    flashTimer = 15;
    playFlash();
    // Destroy all ghosts on screen
    enemies = enemies.filter(e => {
        if (e.type === 'ghost') {
            spawnHitParticles(e.x, e.y);
            return false;
        }
        return true;
    });
    showToast('⚡ ВСПЫШКА!');
    updateHUD();
}

function handleInput() {
    const accel = 0.4;
    let moving = false;

    if (keys['ArrowLeft'] || keys['KeyA']) {
        player.vx -= accel;
        moving = true;
    }
    if (keys['ArrowRight'] || keys['KeyD']) {
        player.vx += accel;
        moving = true;
    }

    // Touch movement — use delta from last frame, not from start
    if (touchStartX !== null && touchMoveX !== null) {
        const dx = touchMoveX - touchStartX;
        if (Math.abs(dx) > 5) {
            player.vx += dx * 0.04;
            moving = true;
        }
        touchStartX = touchMoveX; // reset so dx doesn't accumulate
    }

    // Speed control (up/down)
    speedMultiplier = 1;
    if (keys['ArrowUp'] || keys['KeyW']) {
        speedMultiplier = 1.5;
    } else if (keys['ArrowDown'] || keys['KeyS']) {
        speedMultiplier = 0.4;
    }

    // Vertical touch — swipe up = accelerate, down = brake
    if (touchStartY !== null && touchMoveY !== null) {
        const dy = touchStartY - touchMoveY; // positive = swiped up
        if (dy > 30) speedMultiplier = 1.5;
        else if (dy < -30) speedMultiplier = 0.4;
    }

    // Inertia
    player.vx *= 0.85;
    player.x += player.vx;
    player.lean = Math.max(-1, Math.min(1, player.vx * 0.3));

    if (!moving) {
        player.lean *= 0.85;
    }

    // Clamp position
    player.x = Math.max(W * 0.15 + 20, Math.min(W * 0.85 - 20, player.x));

    // Jump physics
    if (player.jumping) {
        player.jumpVel += 0.7; // gravity
        player.jumpY -= player.jumpVel;
        if (player.jumpY <= 0) {
            player.jumpY = 0;
            player.jumping = false;
            player.jumpVel = 0;
        }
    }
}

// ========================================
// UPDATE LOOP
// ========================================

function update() {
    if (state !== 'playing') return;

    frameCount++;
    player.pedalPhase += speed * 0.05;
    player.wheelPhase += speed * 0.1;

    // Difficulty scaling — 0.1 per 500pts, max 6
    difficulty = Math.min(6, 1 + Math.floor(score / 500) * 0.1);
    speed = Math.min(2.5, baseSpeed + (difficulty - 1) * 0.3) * speedMultiplier + (speedBoostTimer > 0 ? 1 : 0);

    // Score — accumulate fractional points
    scoreFrac += speed * 0.5;
    if (scoreFrac >= 1) {
        const add = Math.floor(scoreFrac);
        score += add;
        scoreFrac -= add;
    }

    // Checkpoint bonus every 1000 points
    const currentCheckpoint = Math.floor(score / 1000);
    if (currentCheckpoint > lastCheckpoint) {
        lastCheckpoint = currentCheckpoint;
        if (lives < MAX_LIVES) {
            lives++;
            showToast('ЧЕКПОИНТ! +1 ❤️');
        } else {
            showToast('ЧЕКПОИНТ!');
        }
        playPowerup();
    }

    // Boss spawn check
    if (!boss && score >= nextBossScore) {
        spawnBoss();
    }

    // Override speed during boss fight
    if (boss) {
        speed = bossSlowTimer > 0 ? 0.3 : 0.5;
    }

    // Battery drain (very slow — ~5 min to drain)
    battery -= 0.005;
    if (battery < 0) battery = 0;

    // Timers
    if (invincibleTimer > 0) invincibleTimer--;
    if (speedBoostTimer > 0) speedBoostTimer--;
    if (shakeTimer > 0) shakeTimer--;
    if (flashTimer > 0) flashTimer--;
    if (flashCooldown > 0) flashCooldown--;

    handleInput();

    // Boss update
    if (boss) updateBoss();

    // Spawn timers
    obstacleTimer++;
    enemyTimer++;
    pickupTimer++;
    treeTimer++;
    heartTimer++;

    const spawnRate = Math.max(80, 150 - Math.floor(score / 500) * 5);
    if (obstacleTimer > spawnRate && obstacles.length < 4) {
        spawnObstacle();
        obstacleTimer = 0;
    }
    // Enemy spawn — zombies every 300+, ghosts every 400+
    const enemyInterval = Math.max(200, 350 - Math.floor(difficulty) * 15);
    if (!boss && enemyTimer > enemyInterval && enemies.length < 2) {
        spawnEnemy();
        enemyTimer = 0;
    }
    if (pickupTimer > 150) {
        spawnPickup();
        pickupTimer = 0;
    }
    if (treeTimer > 40) {
        spawnTree();
        treeTimer = 0;
    }
    // Heart pickup — rare (every 400-500 frames)
    if (heartTimer > 400 + Math.random() * 100) {
        const hx = W * 0.22 + Math.random() * (W * 0.56);
        pickups.push({ x: hx, y: -20, type: 4, phase: Math.random()*Math.PI*2, w: 20, h: 20 });
        heartTimer = 0;
    }

    // Road markings
    if (frameCount % 8 === 0) spawnRoadMarking();

    // Update obstacles
    obstacles.forEach(o => { o.y += speed; });
    obstacles = obstacles.filter(o => o.y < H + 50);

    // Update enemies — all drift at background speed, no extra velocity
    enemies.forEach(e => {
        e.phase += 0.05;
        e.y += speed; // same as tombstones
        if (e.type === 'zombie') {
            e.x += e.vx; // slow 0.2 drift
        } else if (e.type === 'ghost') {
            e.x += Math.sin(frameCount * 0.01) * 0.3; // very gentle sway
        }
        // hand: no lateral movement
        if (e.type === 'hand' && e.popTimer > 0) e.popTimer--;
    });
    // Cap: max 2 enemies on screen
    enemies = enemies.filter(e => e.y < H + 50);
    while (enemies.length > 2) enemies.shift();

    // Update pickups
    pickups.forEach(p => { p.y += speed; p.phase += 0.05; });
    pickups = pickups.filter(p => p.y < H + 50);

    // Update environment
    roadMarkings.forEach(m => { m.y += speed; });
    roadMarkings = roadMarkings.filter(m => m.y < H + 10);

    trees.forEach(t => { t.y += speed; });
    trees = trees.filter(t => t.y < H + 60);

    fogParticles.forEach(f => {
        f.x += f.speed;
        f.y += speed * 0.3;
        if (f.x > W + f.size) f.x = -f.size;
        if (f.y > H + f.size) { f.y = -f.size; f.x = Math.random() * W; }
    });

    stars.forEach(s => { s.twinkle += 0.02; });

    // Update particles
    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        p.vx *= 0.95;
        p.vy *= 0.95;
    });
    particles = particles.filter(p => p.life > 0);

    // Update projectiles
    projectiles.forEach(pr => { pr.y += pr.vy; });
    projectiles = projectiles.filter(pr => pr.y > -20);

    // Projectile-enemy collisions (stones kill zombies/skeletons/hands, NOT ghosts)
    projectiles = projectiles.filter(pr => {
        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            if (e.type === 'ghost') continue; // stones pass through ghosts
            if (e.type === 'hand' && e.popTimer > 0) continue;
            if (checkCollision(pr.x, pr.y, 6, 6, e.x, e.y, e.w, e.h)) {
                spawnHitParticles(e.x, e.y);
                playHit();
                score += 50;
                enemies.splice(i, 1);
                showToast('+50');
                return false;
            }
        }
        return true;
    });

    // COLLISIONS
    const px = player.x;
    const py = player.y - player.jumpY;
    const isJumping = player.jumpY > 15;

    // Obstacle collisions (can jump over) — only one hit per frame
    for (let i = 0; i < obstacles.length; i++) {
        if (invincibleTimer > 0) break;
        const o = obstacles[i];
        if (!isJumping && checkCollision(px, py, 20, 30, o.x, o.y, o.w - 8, o.h - 10)) {
            hitPlayer();
            break;
        }
    }

    // Enemy collisions — only one hit per frame
    for (let i = 0; i < enemies.length; i++) {
        if (invincibleTimer > 0) break;
        const e = enemies[i];
        if (e.type === 'hand' && e.popTimer > 0) continue;
        const canJumpOver = e.type !== 'ghost';
        if ((!canJumpOver || !isJumping) && checkCollision(px, py, 18, 28, e.x, e.y, e.w, e.h)) {
            hitPlayer();
            break;
        }
    }

    // Pickup collisions
    pickups = pickups.filter(p => {
        if (checkCollision(px, py, 24, 34, p.x, p.y, p.w, p.h)) {
            playCollect();
            if (p.type === 0) {
                battery = Math.min(100, battery + 35);
                spawnCollectParticles(p.x, p.y, '#00ffcc');
                showToast('🔋 +35%');
            } else if (p.type === 1) {
                invincibleTimer = 300; // 5 seconds
                spawnCollectParticles(p.x, p.y, '#ff2d95');
                playPowerup();
                showToast('🎵 НЕУЯЗВИМОСТЬ!');
            } else if (p.type === 2) {
                speedBoostTimer = 240; // 4 seconds
                spawnCollectParticles(p.x, p.y, '#ffaa00');
                playPowerup();
                showToast('⚡ УСКОРЕНИЕ!');
            } else if (p.type === 3) {
                stones = Math.min(15, stones + 3);
                spawnCollectParticles(p.x, p.y, '#aa8855');
                showToast('🪨 +3 КАМНЯ');
            } else if (p.type === 4) {
                if (lives < MAX_LIVES) {
                    lives++;
                    spawnCollectParticles(p.x, p.y, '#ff2255');
                    showToast('❤️ +1 ЖИЗНЬ');
                } else {
                    score += 100;
                    spawnCollectParticles(p.x, p.y, '#ff2255');
                    showToast('+100');
                }
            }
            return false;
        }
        return true;
    });

    updateHUD();
}

// ========================================
// RENDER LOOP
// ========================================

function render() {
    ctx.save();

    // Screen shake
    if (shakeTimer > 0) {
        ctx.translate(
            (Math.random() - 0.5) * shakeTimer * 0.8,
            (Math.random() - 0.5) * shakeTimer * 0.8
        );
    }

    drawBackground();

    // Sort all game objects by Y for proper layering
    const allObjects = [];

    trees.forEach(t => allObjects.push({ y: t.y, draw: () => drawTree(t.x, t.y, t.type) }));
    obstacles.forEach(o => allObjects.push({ y: o.y, draw: () => drawTombstone(o.x, o.y, o.type) }));
    enemies.forEach(e => {
        allObjects.push({ y: e.y, draw: () => {
            if (e.type === 'zombie') drawZombie(e.x, e.y, e.phase, e.subtype);
            else if (e.type === 'ghost') drawGhost(e.x, e.y, e.phase);
            else if (e.type === 'hand') {
                if (e.popTimer <= 0) {
                    // Draw grave hand
                    const handPhase = Math.sin(e.phase * 3) * 3;
                    ctx.fillStyle = '#4a7a3a';
                    ctx.fillRect(e.x - 3, e.y + 5, 6, 15);
                    // Fingers
                    ctx.fillRect(e.x - 6, e.y - 2 + handPhase, 4, 8);
                    ctx.fillRect(e.x - 1, e.y - 5 + handPhase, 3, 10);
                    ctx.fillRect(e.x + 3, e.y - 3 + handPhase, 3, 9);
                    // Dirt around
                    ctx.fillStyle = '#1a0a05';
                    for (let i = 0; i < 4; i++) {
                        ctx.fillRect(e.x - 10 + i * 6, e.y + 16, 4, 3);
                    }
                } else {
                    // Pre-warning: dirt cracking
                    if (e.popTimer < 30) {
                        ctx.fillStyle = '#2a1a0a';
                        const shake = Math.random() * 2;
                        ctx.fillRect(e.x - 8 + shake, e.y + 10, 16, 4);
                        ctx.fillRect(e.x - 4 + shake, e.y + 6, 8, 4);
                    }
                }
            }
        }});
    });
    pickups.forEach(p => allObjects.push({ y: p.y, draw: () => drawPickup(p.x, p.y, p.type, p.phase) }));

    // Projectiles (stones)
    projectiles.forEach(pr => {
        ctx.fillStyle = '#aa8866';
        ctx.beginPath();
        ctx.arc(pr.x, pr.y, pr.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#887755';
        ctx.beginPath();
        ctx.arc(pr.x - 1, pr.y - 1, pr.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
    });

    // Sort by y
    allObjects.sort((a, b) => a.y - b.y);

    // Draw objects behind player
    allObjects.filter(o => o.y < player.y).forEach(o => o.draw());

    // Draw boss (always behind player since boss is at top)
    if (boss) drawBoss();

    // Draw player
    drawBike(player.x, player.y, player.lean, player.pedalPhase, player.jumpY, invincibleTimer > 0);

    // Draw objects in front of player
    allObjects.filter(o => o.y >= player.y).forEach(o => o.draw());

    // Particles
    particles.forEach(p => {
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    });
    ctx.globalAlpha = 1;

    // Darkness effects
    drawDarkness();
    drawFullDarkness();

    // Flash effect (on collect)
    if (flashTimer > 0) {
        ctx.globalAlpha = flashTimer * 0.02;
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 1;
    }

    // Invincibility aura
    if (invincibleTimer > 0) {
        const auraAlpha = 0.1 + Math.sin(frameCount * 0.2) * 0.05;
        const auraGrad = ctx.createRadialGradient(player.x, player.y - player.jumpY, 10, player.x, player.y - player.jumpY, 50);
        auraGrad.addColorStop(0, `rgba(255,45,149,${auraAlpha})`);
        auraGrad.addColorStop(1, 'rgba(255,45,149,0)');
        ctx.fillStyle = auraGrad;
        ctx.beginPath();
        ctx.arc(player.x, player.y - player.jumpY, 50, 0, Math.PI * 2);
        ctx.fill();
    }

    // Speed boost trails
    if (speedBoostTimer > 0) {
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = '#ffaa00';
        ctx.lineWidth = 2;
        for (let i = 0; i < 3; i++) {
            const ty = player.y + 20 + i * 15;
            const tx = player.x + (Math.random()-0.5)*10;
            ctx.beginPath();
            ctx.moveTo(tx - 4, ty);
            ctx.lineTo(tx + 4, ty + 10);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;
    }

    ctx.restore();
}

// ========================================
// MAIN LOOP
// ========================================

// ========================================
// MENU / GAME STATE
// ========================================

function startGame() {
    initAudio();
    resetGame();
    state = 'playing';
    menuScreen.classList.add('hidden');
    gameoverScreen.classList.add('hidden');
    hudEl.classList.remove('hidden');
}

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-restart').addEventListener('click', startGame);
document.getElementById('btn-menu').addEventListener('click', () => {
    state = 'menu';
    gameoverScreen.classList.add('hidden');
    menuScreen.classList.remove('hidden');
});

// Init
initEnvironment();

// Main loop
function mainLoop() {
    if (state === 'playing') {
        update();
    } else if (state === 'menu') {
        frameCount++;
        fogParticles.forEach(f => {
            f.x += f.speed;
            if (f.x > W + f.size) f.x = -f.size;
        });
        stars.forEach(s => { s.twinkle += 0.02; });
    }
    render();
    requestAnimationFrame(mainLoop);
}

mainLoop();
